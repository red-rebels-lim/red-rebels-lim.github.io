version: '3.8'

services:
  dev:
    image: node:20
    container_name: red-rebels-calendar-dev
    working_dir: /app
    ports:
      - "80:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - calendar-network

  web:
    build: .
    container_name: red-rebels-calendar
    ports:
      - "80:80"
    restart: unless-stopped
    profiles:
      - production
    networks:
      - calendar-network

networks:
  calendar-network:
    driver: bridge
